<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Aditi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400&display=swap');
        
        body { margin: 0; background: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        #login-screen, #story-container { width: 90%; max-width: 400px; position: relative; }
        
        /* Login */
        input[type="password"] { padding: 12px; border-radius: 25px; border: 1px solid #ff4d4d; width: 80%; background: rgba(255,255,255,0.1); color: #fff; margin-bottom: 20px; outline: none; }
        .btn { padding: 12px 25px; border-radius: 25px; border: none; background: #ff4d4d; color: white; font-weight: bold; cursor: pointer; min-width: 100px; }
        
        /* Letter & Slideshow */
        #story-container { display: none; }
        #letter { font-family: 'Dancing Script', cursive; font-size: 1.6rem; color: #ffcccc; min-height: 150px; margin-bottom: 20px; }
        .photo-frame { display: none; animation: zoomIn 1.5s ease; }
        .photo-frame img { width: 100%; border-radius: 15px; border: 3px solid #ff4d4d; box-shadow: 0 0 15px #ff4d4d; }
        .caption { margin-top: 15px; font-family: 'Dancing Script', cursive; font-size: 1.8rem; color: #ff4d4d; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }
        
        /* Final Proposal - Fixed Buttons */
        #proposal { display: none; margin-top: 20px; }
        .btn-group { display: flex; justify-content: center; gap: 20px; margin-top: 30px; position: relative; width: 100%; height: 60px; }
        #no-btn { position: absolute; transition: 0.2s; left: 55%; }
        #yes-btn { position: absolute; left: 20%; }
    </style>
</head>
<body>
    <audio id="bgMusic" loop><source src="song.mp3" type="audio/mpeg"></audio>

    <div id="login-screen">
        <h2 style="font-family: 'Dancing Script'; color: #ff4d4d; font-size: 2.5rem;">For Aditi Only ❤️</h2>
        <input type="password" id="pass" placeholder="Enter Secret Code...">
        <br><button class="btn" onclick="checkPass()">Unlock Love</button>
    </div>

    <div id="story-container">
        <div id="letter"></div>
        <div id="slideshow">
            <div class="photo-frame" id="f1"><img src="pic1.jpg"><div class="caption">Humari pyaari yaadein ✨</div></div>
            <div class="photo-frame" id="f2"><img src="pic2.jpg"><div class="caption">Sirf tum mere liye... 😍</div></div>
            <div class="photo-frame" id="f3"><img src="pic3.jpg"><div class="caption">Ye muskurahat hamesha rahe ❤️</div></div>
            <div class="photo-frame" id="f4"><img src="pic4.jpg"><div class="caption">Tum meri duniya ho 🌎</div></div>
            <div class="photo-frame" id="f5"><img src="together.jpg"><div class="caption">I Love You Baby! 💖</div></div>
        </div>
        <div id="proposal">
            <h1 style="font-family: 'Dancing Script'; color: #ff4d4d; font-size: 2.8rem;">Do you love me?</h1>
            <div class="btn-group">
                <button class="btn" id="yes-btn" onclick="celebrate()">Yes</button>
                <button class="btn" id="no-btn" onmouseover="moveNo()" onclick="moveNo()">No</button>
            </div>
        </div>
    </div>

    <script>
        function checkPass() {
            if(document.getElementById('pass').value === "Aditi04") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('story-container').style.display = 'block';
                document.getElementById('bgMusic').play().catch(e => console.log("Music wait for user interaction"));
                startStory();
            } else { alert("Galat Password!"); }
        }

        async function startStory() {
            const text = "Hi Aditi,\n\nYe chhota sa surprise sirf tumhare liye... Kyuki tum mere liye sabse khaas ho. ❤️";
            const div = document.getElementById('letter');
            for(let i=0; i<text.length; i++) { div.innerHTML += text.charAt(i); await new Promise(r => setTimeout(r, 55)); }
            await new Promise(r => setTimeout(r, 2500));
            div.style.display = 'none';
            
            for(let i=1; i<=5; i++) {
                let f = document.getElementById('f' + i);
                f.style.display = 'block';
                await new Promise(r => setTimeout(r, 3800));
                if(i<5) f.style.display = 'none';
            }
            document.getElementById('slideshow').style.display = 'none';
            document.getElementById('proposal').style.display = 'block';
        }

        function moveNo() {
            const btn = document.getElementById('no-btn');
            // Isse button screen ke andar hi rahega aur idhar udhar bhagega
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.position = "fixed";
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function celebrate() {
            alert('I Love You Too Jaan! ❤️\nMain jaanta tha tum "Yes" hi kahogi!');
            // Chaho toh yahan confetti ya party effect add kar sakte ho
        }
    </script>
</body>
</html>
